# 정적 Astro 빌드(dist): /about → about/index.html 로 제공
# (Docker 기본 nginx는 try_files 없이 /about 만으로는 404가 나기 쉬움)

server {
    listen 80;
    server_name _;
    # docker -p 호스트포트:80 일 때 /about → /about/ 리다이렉트에 포트가 빠지지 않게 상대 Location 사용
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # 선택: 정적 자산 캐시
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
