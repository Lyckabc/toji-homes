# 정적 Astro 빌드(dist): /about → about/index.html 로 제공
# (Docker 기본 nginx는 try_files 없이 /about 만으로는 404가 나기 쉬움)

# gopedia.toji.homes — gopedia-site 전용 server block
# gopedia-site 디플로이먼트 nginx 컨테이너가 이 블록으로 처리
server {
    listen 80;
    server_name gopedia.toji.homes;
    absolute_redirect off;
    root /usr/share/nginx/html/gopedia-site;
    index index.html;

    # _astro 공유 에셋(CSS/JS)은 상위 dist/ 에 있으므로 루트를 재지정
    location ^~ /_astro/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# toji.homes — 메인 사이트 (catch-all)
server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # /p/{id}/ — digital card pages: serve /p/index.html for any unknown sub-path
    location ^~ /p/ {
        try_files $uri $uri/index.html /p/index.html;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
