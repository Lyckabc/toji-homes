# Astro 정적 빌드 검증 — PR 및 모든 브랜치 push
name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output pages
        run: |
          expected_pages=(
            dist/index.html
            dist/about/index.html
            dist/ko/index.html
            dist/ko/about/index.html
            dist/projects/ai-pragma/index.html
            dist/projects/gopedia/index.html
            dist/projects/neunexus/index.html
            dist/ko/projects/ai-pragma/index.html
            dist/ko/projects/gopedia/index.html
            dist/ko/projects/neunexus/index.html
            dist/gopedia-site/index.html
          )

          all_ok=true
          for page in "${expected_pages[@]}"; do
            if [ -f "$page" ]; then
              echo "  OK  $page"
            else
              echo "  MISSING  $page"
              all_ok=false
            fi
          done

          if [ "$all_ok" = false ]; then
            echo "One or more expected pages are missing."
            exit 1
          fi
