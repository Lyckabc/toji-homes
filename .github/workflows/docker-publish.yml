# ─────────────────────────────────────────────────────────────────────────────
# Docker Build & Push — ghcr.io
#
# 트리거:
#   - main 브랜치 push → :latest 태그
#   - v* 태그 push     → :v1.2.3 + :latest 태그
#
# 이미지:
#   ghcr.io/lyckabc/toji-homes:<tag>
#
# K8s 배포 업데이트:
#   services/homepage/variables.tf 의 homepage_image 변수를 새 태그로 변경 후
#   tofu apply services/homepage/
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # lyckabc/toji-homes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
