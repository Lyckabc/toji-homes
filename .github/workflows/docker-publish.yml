# ─────────────────────────────────────────────────────────────────────────────
# Docker Build & Push — ghcr.io
#
# 트리거:
#   - main 브랜치 push → :main 태그
#   - v* 태그 push     → :v1.2.3 + :major.minor 태그
#
# 이미지:
#   ghcr.io/lyckabc/toji-homes:<tag>
#
# K8s 배포 (deploy job):
#   build-and-push 완료 후 SSH로 서버 접속하여 두 디플로이먼트 재시작
#   - homepage/homepage    : toji.homes 메인 사이트
#   - homepage/gopedia-site: gopedia.toji.homes — GHCR 이미지로 통일
#
# 사전 준비:
#   GitHub Secret: K8S_SSH_KEY — toji.homes SSH 접속용 private key
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # lyckabc/toji-homes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 4321 -H toji.homes >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy — restart homepage & gopedia-site
        run: |
          echo "${{ secrets.K8S_SSH_KEY }}" > /tmp/k8s_key
          chmod 600 /tmp/k8s_key

          ssh -i /tmp/k8s_key \
              -p 4321 \
              ubuntu@toji.homes \
              "
              set -e

              GHCR_IMAGE='ghcr.io/lyckabc/toji-homes:main'

              echo '>>> Ensuring gopedia-site uses GHCR image...'
              kubectl set image deployment/gopedia-site \
                gopedia-site=\${GHCR_IMAGE} \
                -n homepage

              echo '>>> Rolling out homepage & gopedia-site...'
              kubectl rollout restart \
                deployment/homepage \
                deployment/gopedia-site \
                -n homepage

              echo '>>> Waiting for homepage...'
              kubectl rollout status deployment/homepage \
                -n homepage --timeout=120s

              echo '>>> Waiting for gopedia-site...'
              kubectl rollout status deployment/gopedia-site \
                -n homepage --timeout=120s

              echo '>>> Deploy complete.'
              "

          rm -f /tmp/k8s_key
